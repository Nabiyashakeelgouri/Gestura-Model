<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Gestura Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

header{
    background:#1e293b;
    padding:20px;
    text-align:center;
    font-size:28px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    margin-top:40px;
}

.camera-box{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
}

video{
    border-radius:10px;
    background:black;
}

.controls{
    text-align:center;
    margin-top:15px;
}

button{
    padding:10px 18px;
    font-size:16px;
    margin:5px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

.start{background:#22c55e;color:white;}
.detect{background:#3b82f6;color:white;}
.stop{background:#ef4444;color:white;}

.output-box{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    width:300px;
}

.word{
    font-size:28px;
    color:#22c55e;
}

.sentence{
    font-size:22px;
    margin-top:15px;
}

</style>
</head>


<body>

<header>
Gestura AI Sign Language Translator
</header>


<div class="container">

<div class="camera-box">

<video id="camera" width="500" height="350" autoplay playsinline></video>

<div class="controls">
<button class="start" onclick="startCamera()">Start Camera</button>
<button class="detect" onclick="startDetection()">Start Detection</button>
<button class="stop" onclick="stopDetection()">Stop</button>
</div>

</div>


<div class="output-box">

<div class="word" id="word">Word: -</div>

<div class="sentence" id="sentence">Sentence: -</div>

</div>

</div>


<script>

let running = false
const video = document.getElementById("camera")

async function startCamera(){

    try{

        const stream = await navigator.mediaDevices.getUserMedia({
            video:true,
            audio:false
        })

        video.srcObject = stream

    }
    catch(err){

        alert("Camera access denied or unavailable")

    }

}

async function detect(){

    if(!running) return

    try{

        const response = await fetch("http://127.0.0.1:8000/predict-dynamic")

        const data = await response.json()

        document.getElementById("word").innerText =
        "Word: " + data.word

        document.getElementById("sentence").innerText =
        "Sentence: " + data.sentence

    }
    catch(error){

        console.log("Backend error")

    }

    setTimeout(detect,1500)

}

function startDetection(){

    running = true
    detect()

}

function stopDetection(){

    running = false

}

</script>


</body>
</html>
